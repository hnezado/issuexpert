<!doctype html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <h2>Login</h2>

    <form id="loginForm">
      <input
        type="text"
        id="identifier"
        placeholder="Email or username"
        required
      />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <script src="js/routes.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
