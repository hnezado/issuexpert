<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IssueXpert - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  </head>
  <body>
    <h1>Dashboard</h1>
    <header>
      <div class="header-header">
        <img src="assets/logo.svg" alt="Logo" />
        <span class="logo-name">IssueXpert</span>
      </div>
      <div class="header-nav">
        <ul>
          <li><a href="#">Menu 1</a></li>
          <li><a href="#">Menu 2</a></li>
        </ul>
      </div>
      <div id="btn-admin-page" class="btn">Admin page</div>
      <div class="user-info">
        <div class="user-avatar">
          <span id="user-avatar-content"></span>
        </div>
        <div class="user-details">
          <span class="user-name" id="userName">...</span>
          <span class="user-email" id="userEmail">...</span>
          <span class="user-role" id="userRole">...</span>
        </div>
        <div id="btn-logout" class="btn">Logout</div>
      </div>
    </header>
    <h3>My tickets</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Description</th>
          <th>Attachment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>13</td>
          <td>User settings</td>
          <td>My user settings are not working</td>
          <td>&lt;img_543.png&gt;</td>
          <td class="actions-container">
            <button type="button" class="btn">✎</button>
            <button type="button" class="btn">🗑️</button>
          </td>
        </tr>
        <tr>
          <td>532</td>
          <td>KeyboardBroken</td>
          <td>MyLaptopKeyboardSpaceKeyIsNotWorking</td>
          <td>&lt;img_1124.png&gt;</td>
          <td class="actions-container">
            <button type="button" class="btn">✎</button>
            <button type="button" class="btn">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
